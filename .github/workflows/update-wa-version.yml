name: Update WhatsApp Version

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-version:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: yarn install

      - name: Update WhatsApp Web Version
        id: update_version
        run: node scripts/update-wa-version.js

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.check_changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="update-version/stable"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git checkout -b "$BRANCH_NAME"
          git add lib/Defaults/yebails-version.json lib/Defaults/index.js
          git commit -m "chore: update WhatsApp Web version"
          git push origin "$BRANCH_NAME" --force
          
          gh pr create --title "chore: update WhatsApp Web version" --body "Automated WhatsApp Web version update like Whiskeysocket implementation." --base main --head "$BRANCH_NAME" || echo "PR exists"
